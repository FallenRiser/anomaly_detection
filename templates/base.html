<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Supply Chain Anomaly Assistant{% endblock %}</title>
    <meta name="description" content="AI-powered supply chain inventory anomaly explanation assistant for CPG">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-icon">⚡</span>
            <span class="nav-title">SupplyChain<span class="accent">AI</span></span>
        </div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
                <span class="nav-link-icon">📊</span> Dashboard
            </a>
            <a href="{{ url_for('anomaly_list') }}" class="nav-link {% if request.endpoint == 'anomaly_list' %}active{% endif %}">
                <span class="nav-link-icon">🔍</span> Anomalies
            </a>
            <a href="{{ url_for('upload') }}" class="nav-link {% if request.endpoint == 'upload' %}active{% endif %}">
                <span class="nav-link-icon">📤</span> Upload
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Supply Chain Inventory Anomaly Explanation Assistant for CPG &middot; Powered by LangChain + Gemini AI</p>
    </footer>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
